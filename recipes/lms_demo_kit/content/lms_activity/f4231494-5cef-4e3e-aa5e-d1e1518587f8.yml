  feedback_if_wrong:
    -
      value: '<p>The <strong>LMS Teacher</strong> role is responsible for developing and managing course content. LMS Admins have broader system-level access but are not typically the ones building course content day-to-day. Students can only consume content — they cannot create it.</p>'
      format: filtered_html
  question:
    -
      value: '<p>Drupal LMS has three primary user roles, each with a distinct scope of access:</p><table class="table"><thead><tr><th>Role</th><th>Scope</th></tr></thead><tbody><tr><td><strong>LMS Admin</strong></td><td>Full system access — configure all aspects, manage students, oversee the entire learning environment</td></tr><tr><td><strong>LMS Teacher</strong></td><td>Content creator and facilitator — develop courses, monitor student performance, evaluate manual submissions</td></tr><tr><td><strong>Student</strong></td><td>Learner — enrol in courses, complete activities, track personal progress</td></tr></tbody></table><p>Which role is responsible for <strong>developing and managing course content</strong>?</p>'
      format: filtered_html
