      value: '<p>"Allow to revisit" is <strong>enabled by default</strong>, not disabled. This means that after completing a course, students can return to review content and their answers, and can resubmit to improve their score. If you want to prevent this — for example, to run a formal exam — you must explicitly disable this option on the course.</p>'
      format: filtered_html
