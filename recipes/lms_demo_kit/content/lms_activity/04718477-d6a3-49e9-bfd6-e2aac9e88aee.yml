  question:
    -
      value: '<p>Drupal LMS includes a built-in student progress report for each course. This report shows:</p><ul><li data-list-item-id="e543568128fadfa7b3be06000153666f9">All enrolled students (and their class membership)</li><li data-list-item-id="ef959928b97b17cb667802ca19da20db2">Course completion status for each student</li><li data-list-item-id="e298eab1f8c76d664bb7f3dc4d42ad3b7">Score (where applicable)</li><li data-list-item-id="e772720a57fecf99c1c310139cdb2065c">Last activity timestamp</li></ul><p>The report can be filtered by student name, class, or completion status.</p><p>Where do you go to view this report for a specific course?</p>'
      format: filtered_html
