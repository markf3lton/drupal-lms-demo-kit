  feedback_if_correct:
    -
      value: '<p>Correct! "Random activities" draws a set number of activities from the full pool. This is ideal for assessment lessons (quizzes, tests) where you want each student to see a different selection of questions.</p>'
      format: filtered_html
  feedback_if_wrong:
    -
      value: '<p>"<strong>Random activities</strong>" is the setting that draws a subset from the full pool. "Random order" shows all activities but shuffles their sequence. For quizzes and exams, "Random activities" reduces the chance of students sharing specific answers because each student''s activity set may differ.</p>'
      format: filtered_html
  question:
    -
      value: '<p>Lessons in Drupal LMS offer three ways to present activities to students:</p><ul><li data-list-item-id="eb087c222e8ca17835383031c51fb7b4b"><strong>No randomization</strong>: Activities appear in the exact order you set when building the lesson.</li><li data-list-item-id="eac37b4b4e4b0d03a5986ee97951ff724"><strong>Random order</strong>: All activities are shown, but in a different random sequence for each student.</li><li data-list-item-id="eb56d13d3a3283fcb996e7cea8b3c5372"><strong>Random activities</strong>: A specified number of activities are randomly selected from the full set and shown to the student. You define how many activities to draw.</li></ul><p>Which randomization setting would you use if you want each student to see <strong>only a subset</strong> of the available activities, chosen at random?</p>'
      format: filtered_html
