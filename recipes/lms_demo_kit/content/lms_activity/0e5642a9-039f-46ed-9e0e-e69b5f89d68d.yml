  field_feedback_if_correct:
    -
      value: '<p>Correct! With Free Navigation <strong>disabled</strong> (the default), students move through activities in order — they cannot skip ahead. With Free Navigation <strong>enabled</strong>, students can jump to any activity at any time. Use the disabled mode for structured learning paths; use the enabled mode for exploratory or reference content.</p>'
      format: filtered_html
  field_feedback_if_wrong:
    -
      value: '<p>Free Navigation <strong>disabled</strong> (default) → sequential order is enforced. Free Navigation <strong>enabled</strong> → students can move freely between any activities. The words "randomly" and "automatically" do not describe Free Navigation — random activity <em>order</em> is a separate lesson-level randomization setting.</p>'
      format: filtered_html
  field_question_text:
    -
      value: '<p>Free Navigation disabled → students progress through activities [sequentially]. Free Navigation enabled → students can move [freely].</p>'
      format: filtered_html
