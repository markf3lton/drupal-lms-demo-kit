      value: 'Allow to revisit setting'
  created:
    -
      value: 1783691289
  field_information:
    -
      value: '<p>The <strong>Allow to revisit</strong> setting controls what happens after a student completes a course (status becomes Passed, Failed, or Needs grading):</p><ul><li data-list-item-id="e1f7fda70a9a201540a5d13e2e718047b"><strong>Enabled</strong> (default): The student can return to the completed course to review content and their submitted answers. They can also <strong>change and resubmit answers</strong>, which updates their score.</li><li data-list-item-id="e28ac83aadd34a451668eb49ffe176ed1"><strong>Disabled</strong>: Once a course is completed, it is <strong>locked</strong>. The student cannot re-enter to view content or change answers. After grading, the course displays a <strong>Restart</strong> button that begins a brand new attempt from the beginning.</li></ul><p><strong>When to disable Allow to revisit:</strong></p><ul><li data-list-item-id="e867f72a1fd7ca05e1d706834a3928e5d">Formal assessments and exams where you want each attempt to be independent</li><li data-list-item-id="e0ec477d9e4a51b33d429a277503ec905">Scenarios where you need a clean separation between attempts for reporting purposes</li></ul><p><strong>Note on "Needs grading" status:</strong> If Allow to revisit is disabled and the course needs manual grading, the student cannot access the course until a teacher submits a grade — unless the global "Allow to enter ungraded courses" setting is enabled.</p>'
      format: filtered_html
