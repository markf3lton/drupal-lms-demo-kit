  question:
    -
      value: '<p>In Drupal LMS, <strong>Classes</strong> are an optional feature that allows you to group students who are enrolled in a course. Multiple classes can experience the same course content, potentially with different teachers or on different timelines.</p><p>What is the primary purpose of Classes in Drupal LMS?</p>'
      format: filtered_html
